apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/maxmorhardt/k8s.git
    targetRevision: main
    path: argocd
    directory:
      recurse: true
      # values.yaml is the argo-cd chart's own, consumed by infra/argocd.yaml;
      # secrets/ has its own Application so it can run prune: false
      exclude: '{values.yaml,secrets/*}'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
