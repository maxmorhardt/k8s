apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: maxstash
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: maxstash
  source:
    repoURL: ghcr.io/maxmorhardt/charts
    chart: maxstash
    targetRevision: 1.0.2
    helm:
      parameters:
        - name: image.tag
          value: 2.0.1
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
