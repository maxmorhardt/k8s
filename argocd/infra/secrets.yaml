apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  source:
    repoURL: https://github.com/maxmorhardt/k8s.git
    targetRevision: main
    path: argocd/secrets
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
