replicaCount: 2

envFrom:
  - secretRef:
      name: dex-env

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

volumes:
  - name: tmp
    emptyDir: {}

volumeMounts:
  - name: tmp
    mountPath: /tmp

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: dex

httpRoute:
  enabled: true
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: maxstash
      namespace: envoy-gateway-system
  hostnames:
    - login.maxstash.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

config:
  issuer: https://login.maxstash.io

  expiry:
    idTokens: "12h"
    refreshTokens:
      validIfNotUsedFor: "720h"
      absoluteLifetime: "2160h"

  web:
    allowedOrigins:
      - https://squares.maxstash.io
      - https://olympics.maxstash.io
      - https://ages.maxstash.io
      - https://grafana.maxstash.io
      - https://argocd.maxstash.io
      - http://localhost:3000

  storage:
    type: postgres
    config:
      host: postgres-cluster-rw.cnpg-database.svc.cluster.local
      port: 5432
      database: dex
      user: dex
      password: $DEX_POSTGRES_PASSWORD
      ssl:
        mode: require

  oauth2:
    skipApprovalScreen: true

  enablePasswordDB: false

  connectors:
    - type: google
      id: google
      name: Google
      config:
        clientID: $GOOGLE_CLIENT_ID
        clientSecret: $GOOGLE_CLIENT_SECRET
        redirectURI: https://login.maxstash.io/callback
        promptType: ""

    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        redirectURI: https://login.maxstash.io/callback
        loadAllGroups: false

  staticClients:
    - id: squares
      name: Squares
      public: true
      redirectURIs:
        - https://squares.maxstash.io/auth/callback
        - http://localhost:3000/auth/callback

    - id: olympics
      name: Olympics
      public: true
      redirectURIs:
        - https://olympics.maxstash.io/auth/callback
        - http://localhost:3000/auth/callback

    - id: ages
      name: Ages
      secretEnv: AGES_CLIENT_SECRET
      redirectURIs:
        - https://ages.maxstash.io/oauth2/callback

    - id: grafana
      name: Grafana
      secretEnv: GRAFANA_CLIENT_SECRET
      redirectURIs:
        - https://grafana.maxstash.io/login/generic_oauth

    - id: argocd
      name: Argo CD
      secretEnv: ARGOCD_CLIENT_SECRET
      redirectURIs:
        - https://argocd.maxstash.io/auth/callback

    - id: argocd-cli
      name: Argo CD CLI
      public: true
      redirectURIs:
        - http://localhost:8085/auth/callback
