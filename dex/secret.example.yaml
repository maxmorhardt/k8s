apiVersion: v1
kind: Secret
metadata:
  name: dex-env
  namespace: dex
type: Opaque
stringData:
  DEX_POSTGRES_PASSWORD: "CHANGE-ME-PASSWORD"

  # google cloud console -> apis & services -> credentials -> oauth client id (web application)
  # authorized redirect uri: https://login.maxstash.io/callback
  GOOGLE_CLIENT_ID: "CHANGE-ME.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "CHANGE-ME"

  # github -> settings -> developer settings -> oauth apps
  # authorization callback url: https://login.maxstash.io/callback
  GITHUB_CLIENT_ID: "CHANGE-ME"
  GITHUB_CLIENT_SECRET: "CHANGE-ME"

  # generate with: openssl rand -hex 32 (must match GF_OAUTH_CLIENT_SECRET in grafana-env)
  GRAFANA_CLIENT_SECRET: "CHANGE-ME"
