name: PostgreSQL Cluster CD

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Override chart version (blank = pinned)'
        required: false
        type: string
        default: ''
      mode:
        description: 'Cluster mode'
        required: false
        type: choice
        options:
          - normal
          - recovery
          - hibernate
        default: normal
  push:
    branches: [main]
    paths:
      - 'postgres/values-cluster*.yaml'
      - '.github/workflows/cd-postgresql-cluster.yml'

jobs:
  cd:
    uses: maxmorhardt/workflows/.github/workflows/cd-helm.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: postgres
      namespace: cnpg-database
      values_file: ${{ inputs.mode == 'recovery' && 'postgres/values-cluster-recovery.yaml' || inputs.mode == 'hibernate' && 'postgres/values-cluster-hibernate.yaml' || 'postgres/values-cluster.yaml' }}
      helm_repo_name: cnpg
      helm_repo_url: https://cloudnative-pg.github.io/charts
      chart: cnpg/cluster
      # renovate: datasource=helm depName=cluster registryUrl=https://cloudnative-pg.github.io/charts
      chart_version: ${{ github.event.inputs.chart_version || '0.6.0' }}
    secrets: inherit
