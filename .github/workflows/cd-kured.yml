name: kured CD

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Override chart version (blank = pinned)'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'kured/**'
      - '.github/workflows/cd-kured.yml'

jobs:
  cd:
    uses: maxmorhardt/workflows/.github/workflows/cd-helm.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: kured
      namespace: kube-system
      values_file: kured/values.yaml
      helm_repo_name: kubereboot
      helm_repo_url: https://kubereboot.github.io/charts
      chart: kubereboot/kured
      # renovate: datasource=helm depName=kured registryUrl=https://kubereboot.github.io/charts
      chart_version: ${{ github.event.inputs.chart_version || '6.1.0' }}
    secrets: inherit
