name: Envoy Gateway CD

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Override chart version (blank = pinned)'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'envoy-gateway/**'
      - '.github/workflows/cd-envoy-gateway.yml'

jobs:
  cd:
    uses: maxmorhardt/workflows/.github/workflows/cd-helm.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: envoy-gateway
      namespace: envoy-gateway-system
      values_file: envoy-gateway/values.yaml
      chart: oci://docker.io/envoyproxy/gateway-helm
      # renovate: datasource=docker depName=docker.io/envoyproxy/gateway-helm
      chart_version: ${{ github.event.inputs.chart_version || 'v1.8.2' }}
    secrets: inherit
