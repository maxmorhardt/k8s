name: Kube Prometheus Stack CD

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Override chart version (blank = pinned)'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'prometheus-stack/**'
      - '.github/workflows/cd-promtheus-stack.yml'

jobs:
  cd:
    uses: maxmorhardt/workflows/.github/workflows/cd-helm.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: kube-prometheus-stack
      namespace: monitoring
      values_file: prometheus-stack/values.yaml
      helm_repo_name: prometheus-community
      helm_repo_url: https://prometheus-community.github.io/helm-charts
      chart: prometheus-community/kube-prometheus-stack
      # renovate: datasource=helm depName=kube-prometheus-stack registryUrl=https://prometheus-community.github.io/helm-charts
      chart_version: ${{ github.event.inputs.chart_version || '87.17.0' }}
    secrets: inherit
