name: k8s CI

on:
  pull_request:
    branches: [main]

jobs:
  discover:
    name: Discover charts
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build validation matrix from cd-*.yml
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          # read a scalar `<key>: <value>` line from a cd workflow's with: block
          field() { grep -E "^[[:space:]]+$1:[[:space:]]" "$2" 2>/dev/null | head -1 | sed -E "s/^[[:space:]]+$1:[[:space:]]+//" | tr -d '\r' || true; }

          items=()
          for f in .github/workflows/cd-*.yml; do
            # only helm-based CD jobs (skip cd-manifest callers)
            grep -qE 'uses:.*cd-helm\.yml' "$f" || continue

            chart=$(field chart "$f")
            repo_name=$(field helm_repo_name "$f")
            repo_url=$(field helm_repo_url "$f")

            # pinned fallback: the default literal after '||' in the chart_version line
            version=$(grep -E "chart_version:.*\|\|" "$f" 2>/dev/null | head -1 | sed -E "s/.*\|\|[[:space:]]*'([^']+)'.*/\1/" | tr -d '\r' || true)

            values=$(field values_file "$f")
            # collapse a conditional values_file expression to its default *.yaml
            if printf '%s' "$values" | grep -q '{{'; then
              values=$(printf '%s' "$values" | grep -oE "'[^']*\.yaml'" | tail -1 | tr -d "'" || true)
            fi

            items+=("$(jq -n -c \
              --arg name "$(basename "$f" .yml | sed 's/^cd-//')" \
              --arg chart "$chart" \
              --arg version "$version" \
              --arg repo_name "$repo_name" \
              --arg repo_url "$repo_url" \
              --arg values "$values" \
              '{name:$name, chart:$chart, chart_version:$version, helm_repo_name:$repo_name, helm_repo_url:$repo_url, values_file:$values}')")
          done

          if [ ${#items[@]} -eq 0 ]; then
            matrix='{"include":[]}'
          else
            matrix=$(printf '%s\n' "${items[@]}" | jq -s -c '{include: .}')
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .

  validate:
    name: Validate ${{ matrix.name }}
    needs: discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: maxmorhardt/workflows/.github/workflows/validate-helm.yml@main
    with:
      repository: ${{ github.repository }}
      chart: ${{ matrix.chart }}
      chart_version: ${{ matrix.chart_version }}
      helm_repo_name: ${{ matrix.helm_repo_name }}
      helm_repo_url: ${{ matrix.helm_repo_url }}
      values_file: ${{ matrix.values_file }}
      lint: false
      ignore_missing_schemas: true

  validate-manifests:
    uses: maxmorhardt/workflows/.github/workflows/validate-manifests.yml@main
    with:
      repository: ${{ github.repository }}
      manifests: |
        system-upgrade-controller/plans.yaml
        storage/local-path-retain.yaml
