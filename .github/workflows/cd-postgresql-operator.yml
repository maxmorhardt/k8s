name: PostgreSQL Operator CD

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Override chart version (blank = pinned)'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'postgres/values-operator.yaml'
      - '.github/workflows/cd-postgresql-operator.yml'

jobs:
  cd:
    uses: maxmorhardt/workflows/.github/workflows/cd-helm.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: cloudnativepg
      namespace: cnpg-system
      values_file: postgres/values-operator.yaml
      helm_repo_name: cnpg
      helm_repo_url: https://cloudnative-pg.github.io/charts
      chart: cnpg/cloudnative-pg
      # renovate: datasource=helm depName=cloudnative-pg registryUrl=https://cloudnative-pg.github.io/charts
      chart_version: ${{ github.event.inputs.chart_version || '0.27.1' }}
    secrets: inherit
