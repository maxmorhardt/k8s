name: Alloy CD

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Override chart version (blank = pinned)'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'alloy/**'
      - '.github/workflows/cd-alloy.yml'

jobs:
  cd:
    uses: maxmorhardt/workflows/.github/workflows/cd-helm.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: alloy
      namespace: monitoring
      values_file: alloy/values.yaml
      helm_repo_name: grafana
      helm_repo_url: https://grafana.github.io/helm-charts
      chart: grafana/alloy
      # renovate: datasource=helm depName=alloy registryUrl=https://grafana.github.io/helm-charts
      chart_version: ${{ github.event.inputs.chart_version || '1.10.1' }}
    secrets: inherit
