name: Dex CD

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: Dex chart version to deploy
        required: false
        type: string
        default: '0.24.1'
jobs:
  cd:
    uses: maxmorhardt/workflows/.github/workflows/cd-helm.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: dex
      namespace: dex
      values_file: dex/values.yaml
      helm_repo_name: dex
      helm_repo_url: https://charts.dexidp.io
      chart: dex/dex
      chart_version: ${{ github.event.inputs.chart_version }}
    secrets: inherit
