name: Dex CD

on:
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'Override chart version (blank = pinned)'
        required: false
        type: string
        default: ''
  push:
    branches: [main]
    paths:
      - 'dex/**'
      - '.github/workflows/cd-dex.yml'

jobs:
  cd:
    uses: maxmorhardt/workflows/.github/workflows/cd-helm.yml@main
    with:
      repository: ${{ github.repository }}
      release_name: dex
      namespace: dex
      values_file: dex/values.yaml
      helm_repo_name: dex
      helm_repo_url: https://charts.dexidp.io
      chart: dex/dex
      # renovate: datasource=helm depName=dex registryUrl=https://charts.dexidp.io
      chart_version: ${{ github.event.inputs.chart_version || '0.24.1' }}
    secrets: inherit
