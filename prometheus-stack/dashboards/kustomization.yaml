apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

# each dashboard becomes a configmap the grafana sidecar auto-loads
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: '1'

configMapGenerator:
  - name: grafana-dashboard-node-exporter-full
    files:
      - node-exporter-full.json
  - name: grafana-dashboard-nginx
    files:
      - nginx.json
  - name: grafana-dashboard-nats
    files:
      - nats.json
  - name: grafana-dashboard-argocd
    files:
      - argocd.json
  - name: grafana-dashboard-loki
    files:
      - loki.json
  - name: grafana-dashboard-kured
    files:
      - kured.json
  - name: grafana-dashboard-sealed-secrets
    files:
      - sealed-secrets.json
