crds:
  enabled: true

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerResource: true
    k8sContainerMemoryWorkingSetBytes: true
    k8sPodOwner: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false
    kubelet: true
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
    windows: false

additionalPrometheusRulesMap: {}

global:
  rbac:
    create: true

windowsMonitoring:
  enabled: false

alertmanager:
  enabled: true
  service:
    port: 9093
  serviceMonitor:
    selfMonitor: true
  alertmanagerSpec:
    image:
      registry: quay.io
      repository: prometheus/alertmanager
      tag: v0.30.0
      pullPolicy: IfNotPresent
    replicas: 2
    retention: 120h
    configSecret: alertmanager
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path-retain
          accessModes: ['ReadWriteOnce']
          resources:
            requests:
              storage: 1Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: alertmanager
              topologyKey: kubernetes.io/hostname
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 50m
        memory: 128Mi
    securityContext:
      runAsGroup: 2000
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault

prometheus:
  enabled: true
  serviceMonitor:
    selfMonitor: true
  prometheusSpec:
    replicas: 1
    retention: 14d
    scrapeInterval: '90s'
    scrapeTimeout: '60s'
    evaluationInterval: '90s'
    serviceMonitorSelector: {}
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelector: {}
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelector: {}
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 300m
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path-retain
          accessModes:
            - 'ReadWriteOnce'
          resources:
            requests:
              storage: 32Gi
    securityContext:
      runAsGroup: 2000
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault

grafana:
  enabled: true
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: etc
  deploymentStrategy:
    type: Recreate
  admin:
    existingSecret: 'grafana-credentials'
    userKey: admin-user
    passwordKey: admin-password
  envFromSecret: 'grafana-env'
  database:
    type: postgres
    host: '${GF_DB_HOST}'
    name: '${GF_DB_NAME}'
    user: '${GF_DB_USER}'
    password: '${GF_DB_PASSWORD}'
    sslMode: require
  grafana.ini:
    server:
      domain: grafana.maxstash.io
      root_url: 'https://grafana.maxstash.io'
    auth.generic_oauth:
      enabled: true
      name: maxstash
      client_id: '${GF_OAUTH_CLIENT_ID}'
      client_secret: '${GF_OAUTH_CLIENT_SECRET}'
      scopes: 'openid email profile offline_access'
      auth_url: 'https://login.maxstash.io/application/o/authorize/'
      token_url: 'https://login.maxstash.io/application/o/token/'
      api_url: 'https://login.maxstash.io/application/o/userinfo/'
      allow_sign_up: true
      auto_login: false
      use_refresh_token: true
      role_attribute_path: contains(groups[*], 'grafana-admin') && 'Admin'
      role_attribute_strict: true
      use_pkce: true
    users:
      allow_sign_up: false
      auto_assign_org: true
      auto_assign_org_role: Viewer
    analytics:
      reporting_enabled: false
      check_for_updates: false
    security:
      disable_gravatar: true
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: '1m'
      nginx.ingress.kubernetes.io/client-body-buffer-size: '1m'
      nginx.ingress.kubernetes.io/limit-connections: '10'
      nginx.ingress.kubernetes.io/limit-rps: '20'
      nginx.ingress.kubernetes.io/limit-burst-multiplier: '3'
      nginx.ingress.kubernetes.io/configuration-snippet: |
        add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;
    hosts:
      - grafana.maxstash.io
    path: /
    tls:
      - secretName: maxstash.io-tls
        hosts:
          - grafana.maxstash.io
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 768Mi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  initChownData:
    enabled: false

  persistence:
    enabled: true
    storageClassName: local-path-retain
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  extraVolumes:
    - name: tmp
      emptyDir: {}
  extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
  serviceAccount:
    create: true
    autoMount: true
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
  service:
    portName: http-web
  serviceMonitor:
    enabled: true
    path: '/metrics'

kubernetesServiceMonitors:
  enabled: true

kubeApiServer:
  enabled: true
  serviceMonitor:
    enabled: true

kubelet:
  enabled: true
  namespace: kube-system
  serviceMonitor:
    enabled: true
    https: true

kubeControllerManager:
  enabled: true
  serviceMonitor:
    enabled: true

coreDns:
  enabled: true
  serviceMonitor:
    enabled: true

kubeEtcd:
  enabled: true
  serviceMonitor:
    enabled: true

kubeScheduler:
  enabled: true
  serviceMonitor:
    enabled: true

kubeProxy:
  enabled: true
  serviceMonitor:
    enabled: true

kubeStateMetrics:
  enabled: true

prometheus-node-exporter:
  enabled: true

prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi
  prometheusConfigReloader:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
