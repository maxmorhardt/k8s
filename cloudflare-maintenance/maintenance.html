<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Down for maintenance · maxstash</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #e6e8f0;
    background: #0a0a12;
    display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
    overflow: hidden;
  }

  .glow {
    position: fixed; inset: -20% ; z-index: 0; pointer-events: none;
    background:
      radial-gradient(40% 40% at 30% 30%, rgba(109, 40, 217, 0.24), transparent 70%),
      radial-gradient(40% 40% at 70% 70%, rgba(37, 99, 235, 0.20), transparent 70%);
    filter: blur(40px);
    animation: drift 18s ease-in-out infinite alternate;
  }
  @keyframes drift {
    from { transform: translate3d(-4%, -3%, 0) scale(1); }
    to   { transform: translate3d(4%, 3%, 0) scale(1.1); }
  }

  .card {
    position: relative; z-index: 1;
    max-width: 30rem; padding: 48px 40px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    backdrop-filter: blur(12px);
    box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
  }

  .logo {
    width: 84px; height: 84px; margin: 0 auto 28px;
    filter: drop-shadow(0 10px 30px rgba(109, 40, 217, 0.45));
  }

  h1 {
    font-size: clamp(1.7rem, 4vw, 2.35rem);
    line-height: 1.15; margin: 0 0 14px; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #ffffff 0%, #c9b8ff 55%, #93b4ff 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p { font-size: 1.05rem; line-height: 1.6; color: #9aa0b8; margin: 0 auto; max-width: 24rem; }

  .status {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 30px; padding: 8px 16px;
    font-size: 0.82rem; font-weight: 600; letter-spacing: 0.02em;
    color: #c9b8ff;
    background: rgba(109, 40, 217, 0.12);
    border: 1px solid rgba(109, 40, 217, 0.3);
    border-radius: 999px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #8b5cf6; box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7);
    animation: pulse 1.8s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7); }
    70%  { box-shadow: 0 0 0 10px rgba(139, 92, 246, 0); }
    100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
  }

  .foot { margin-top: 28px; font-size: 0.8rem; color: #565c78; letter-spacing: 0.08em; text-transform: uppercase; }

  @media (prefers-reduced-motion: reduce) {
    .glow, .logo, .dot { animation: none; }
  }
</style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <main class="card">
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="maxstash">
      <defs>
        <linearGradient id="ms-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#6d28d9" />
          <stop offset="1" stop-color="#2563eb" />
        </linearGradient>
      </defs>
      <rect x="22" y="22" width="32" height="32" rx="8" fill="url(#ms-grad)" fill-opacity="0.3" />
      <rect x="16" y="16" width="32" height="32" rx="8" fill="url(#ms-grad)" fill-opacity="0.6" />
      <rect x="10" y="10" width="32" height="32" rx="8" fill="url(#ms-grad)" />
    </svg>

    <h1>Down for maintenance</h1>
    <p>We're performing scheduled work on our infrastructure. Everything will be back online shortly.</p>

    <div class="status">
      <span class="dot" aria-hidden="true"></span>
      Maintenance in progress
    </div>

    <div class="foot">maxstash.io</div>
  </main>
</body>
</html>
